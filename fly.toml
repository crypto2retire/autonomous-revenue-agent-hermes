app = 'crypto-agent-serene-surf-3922'
primary_region = 'ord'

[build]

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"
  AGENT_MODE = "paper"
  DATABASE_URL = "sqlite+aiolibsql:///agent.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "agent_data"
  destination = "/data"
