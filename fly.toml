app = "autonomous-revenue-agent-hermes"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  AGENT_MODE = "paper"
  PYTHONUNBUFFERED = "1"

# Main service: dashboard + API + survival loop (all in one process)
[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.checks]]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    port = 8000

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
